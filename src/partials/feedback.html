<section class="feedbacks" id="feedback">
  <div class="feedbacks__container">
    <h2 class="feedbacks__title">Відгуки Клієнтів</h2>
    <p class="feedbacks__subtitle">
      Дізнайтеся, що кажуть наші задоволені клієнти про наші меблі.
    </p>

    <div class="feedbacks__slider">
      <div class="swiper feedbacks-swiper">
        <div class="swiper-wrapper" id="feedbacksWrapper"></div>
      </div>

      <div class="feedbacks__controls">
        <div class="feedbacks__pagination" id="fbPagination"></div>
        <div class="feedbacks__arrows">
          <button class="fb-btn fb-btn--prev" id="fbPrev" aria-label="Попередній відгук">
            <svg width="20" height="20" viewBox="0 0 24 24">
              <path d="M15.5 19l-7-7 7-7" fill="none" stroke="currentColor" stroke-width="2"
                stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </button>

          <button class="fb-btn fb-btn--next" id="fbNext" aria-label="Наступний відгук">
            <svg width="20" height="20" viewBox="0 0 24 24">
              <path d="M8.5 5l7 7-7 7" fill="none" stroke="currentColor" stroke-width="2"
                stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </button>
        </div>
      </div>
    </div>
  </div>
</section>
